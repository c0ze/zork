    '
  rooms:
  - NORTH-CORRIDOR
- id: Parapet
  room: PARAPET
  slug: parapet
  region: peril
  anchors: []
  scene_description: 'You are standing behind a stone retaining wall rimming a parapet that
    overlooks a fiery, seemingly bottomless pit some two hundred feet across, fashioned of roughly
    hewn stone. The flames throw off considerable heat. Nearby stands an object like a sundial:
    an indicator arrow surrounding a large button, its face numbered one through eight. To the
    south, across a narrow corridor, is a prison cell.

    '
  scene_core: 'A stone parapet behind a low retaining wall, overlooking a vast circular pit
    of roaring fire and smoke that seems bottomless; shimmering heat; a curious sundial-like
    dial — an arrow around a central button, its face numbered one to eight — standing on the
    parapet; hellish orange light, peril.

    '
  rooms:
  - PARAPET
- id: Prison Cell
  room: PRISON-CELL
  slug: prison-cell
  region: peril
  anchors:
  - dungeon-master
  scene_description: 'You are in a featureless prison cell. Through the small barred window
    in the closed door you can see the parapet and, behind it, smoke and flames rising from
    a fiery pit. The Dungeon Master stands at the parapet, leaning on his staff, his keen gaze
    fixed on you as if waiting for something. Behind you, to the south, is a bronze door.

    '
  scene_core: 'A bare stone prison cell; through a small barred window in the iron door, a view
    of a fiery pit and parapet beyond; on the parapet a tall robed figure — the Dungeon Master
    — leaning on a staff, watching intently; a bronze door behind; tense, fire-lit gloom.

    '
  rooms:
  - CELL
  - PRISON-CELL
  - GOOD-CELL
- id: Treasury of Zork
  room: NIRVANA
  rooms:
  - NIRVANA
  slug: treasury-of-zork
  region: wonder
  anchors:
  - dungeon-master
  scene_description: This is a large room, richly appointed in a style that bespeaks exquisite
    taste. To judge from its contents, it is the ultimate storehouse of the wealth of the Great
    Underground Empire. There are chests containing precious jewels, mountains of zorkmids,
    rare paintings, ancient statuary, and beguiling curios. On one wall is an annotated map
    of the Empire, showing the locations of various troves of treasure, and of many superior
    scenic views. On a desk at the far end of the room are stock certificates representing a
    controlling interest in FrobozzCo International, the multinational conglomerate and parent
    company of the Frobozz Magic Boat Co., etc.
  scene_core: This is a large room, richly appointed in a style that bespeaks exquisite taste.
    To judge from its contents, it is the ultimate storehouse of the wealth of the Great Underground
