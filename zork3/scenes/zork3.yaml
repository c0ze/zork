- id: Water Slide
  room: AQ-3
  rooms:
  - AQ-3
  slug: water-slide
  region: underground
  anchors: []
  scene_description: You are near the northern end of this segment of the aqueduct system. To
    the south and slightly uphill, the bulk of the aqueduct looms ominously, towering above
    a gorge. To the north, the water channel drops precipitously and enters a rocky hole. The
    damp moss and lichen would certainly make that a one-way trip. The southern part of the
    aqueduct system is inaccessable due to the collapse of one of the water-bearing arches.
    manhole cover
