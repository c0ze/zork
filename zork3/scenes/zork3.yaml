- id: Cliff
  room: CLIFF
  rooms:
  - CLIFF
  slug: cliff
  region: above_ground
  anchors: []
  scene_description: This is a remarkable spot in the dungeon. Perhaps two hundred feet above
    you is a gaping hole in the earth's surface through which pours bright sunshine! A few seedlings
    from the world above, nurtured by the sunlight and occasional rains, have grown into giant
    trees, making this a virtual oasis in the desert of the Underground Empire. To the west
    is a sheer precipice, dropping nearly fifty feet to jagged rocks below. The way south is
    barred by a forbidding stone wall, crumbling from age. There is a jagged opening in the
    wall to the southwest, through which leaks a fine mist. The land to the east looks lifeless
    and barren. A rope is tied to one of the large trees here and is dangling over the side
    of the cliff, reaching down to the shelf below. You catch, out of the corner of your eye,
    some movement among the trees. You seem to hear, from the southwest, the sounds of the sea.
  scene_core: This is a remarkable spot in the dungeon. Perhaps two hundred feet above you is
    a gaping hole in the earth's surface through which pours bright sunshine! A few seedlings
    from the world above, nurtured by the sunlight and occasional rains, have grown into giant
    trees, making this a virtual oasis in the desert of the Underground Empire. To the west
    is a sheer precipice, dropping nearly fifty feet to jagged rocks below. The way south is
