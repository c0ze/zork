- id: Flathead Ocean
  room: FLATHEAD-OCEAN
  slug: flathead-ocean
  region: above_ground
  anchors: []
  scene_description: 'You are at the shore of an amazing underground sea, the topic of many
    a legend among adventurers. A heavy surf rolls in and a breeze blows onshore. The land rises
    steeply to the east, quicksand bars the way south, and a thick mist covers the ocean. A
    path heads north along the beach. Far out on the misty water, an ancient Viking ship passes
    along the shore, an old and crusty sailor standing at its prow.

    '
  scene_core: 'The misty shore of a vast underground sea; heavy surf breaking on a dark beach;
    steep land rising east, a path heading north; far out on the fog-shrouded water an ancient
    Viking longship glides past, a grizzled old sailor at its prow peering shoreward; legendary,
    melancholy, wide.

    '
  rooms:
  - FLATHEAD-OCEAN
