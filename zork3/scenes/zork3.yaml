  slug: royal-puzzle-entrance
  region: wonder
  anchors: []
  scene_description: This is a small square room, in the middle of which is a round hole which
    is blocked by smooth sandstone. through which you can discern the floor some ten feet below.
    The area under the hole is dark, but it appears to be completely enclosed in rock. In any
    event, it doesn't seem likely that you could climb back up. Exits are west and, up a few
    steps, north.
  scene_core: This is a small square room, in the middle of which is a round hole which is blocked
