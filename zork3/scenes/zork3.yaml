- id: Great Door
  room: MUSEUM-ANTE
  slug: great-door
  region: peril
  anchors: []
  scene_description: 'This is the south end of a monumental hall, full of debris from a recent
    earthquake. To the east stands a tremendous iron door, rusted shut; to its right a gaping
    cleft has been torn in the rock, opening onto a cleared area beyond.

    '
  scene_core: 'The south end of a vast, ruined ceremonial hall strewn with earthquake debris
    and fallen stone; a colossal rusted-shut iron door in the east wall; beside it a jagged
    cleft torn through the rock; grand, broken, shadowed.

    '
  rooms:
  - MUSEUM-ANTE
- id: Museum Entrance
  room: MUSEUM-ENTRANCE
  slug: museum-entrance
  region: wonder
  anchors: []
  scene_description: 'This is the entrance hall of the Royal Museum, the grandest in the Great
    Underground Empire. A few wide steps lead south to the Royal Puzzle; a stone door to the
    east opens on the Royal Jewel Collection; a wooden door to the north leads to the Museum
    of Technology; and to the west stands a great iron door, rusted shut, with a cleft in the
    rock beside it.

    '
  scene_core: 'The grand entrance hall of an underground royal museum; wide ceremonial steps
    descending south; an ornate stone door east and a carved wooden door north; a massive rusted
    iron door west with a cleft in the rock beside it; faded imperial grandeur, dim.

    '
  rooms:
  - MUSEUM-ENTRANCE
  - MID-MUSEUM-ENTRANCE
  - OLD-MUSEUM-ENTRANCE
- id: Jewel Room
  room: JEWEL-ROOM
  slug: jewel-room
  region: wonder
  anchors: []
  scene_description: 'You are in a high-ceilinged chamber, in the middle of which stands a tall,
    round steel cage, securely locked. Within the cage is a pedestal bearing the Crown Jewels
    of the Great Underground Empire — a sceptre, a jewelled knife, and a golden ring. A small
    bronze plaque, now tarnished, is fixed to the cage.

    '
  scene_core: 'A high-ceilinged museum chamber; at its centre a tall cylindrical steel cage,
    locked; inside, a pedestal displaying crown jewels — a sceptre, a jewelled dagger, a golden
    ring — glinting under focused light; a tarnished bronze plaque on the cage; hushed, reverent,
    dim.

    '
  rooms:
  - JEWEL-ROOM
  - MID-JEWEL-ROOM
  - OLD-JEWEL-ROOM
