  scene_description: You are west of the junction, where the rock-bound passage widens out into
    a large, flat area. Although the land here is barren, you can see vegetation to the west.
    South of here is a mighty wall of stone, ancient and crumbling. To the southwest the wall
    has decayed enough to form an opening, through which seeps a thin mist. A trail dips sharply
    into rocky terrain to the northwest.
  scene_core: You are west of the junction, where the rock-bound passage widens out into a large,
