- id: High Arch
  room: AQ-2
  rooms:
  - AQ-2
  slug: high-arch
  region: underground
  anchors: []
  scene_description: You are now on one of the tallest arches of the aqueduct, hundreds of feet
    above a rocky chasm. The immensity of the aqueduct project is apparent from here. Stone
    supports rise from the rock floor to form massive arches, which traverse the region from
    north to south. The water-carrying channel here is wide and deep. To the west and far below,
    you can make out a balcony which must command a wide view of the aqueduct. The channel ends
    abruptly to your north where a supporting pillar has crumbled, casting the arch into the
    chasm.
