- id: Inside Mirror
  room: IN-MIRROR
  slug: inside-mirror
  region: wonder
  anchors: []
  scene_description: 'You are inside a rectangular wooden box of complicated structure: four
    sides and the roof are filled in and the floor is open. Two short side-panels are of carved
    and polished wood — mahogany on the left, pine on the right; the wall you face is painted
    red and black, the wall behind white and yellow, and the ceiling blue. A narrow channel
    runs north to south through the stone floor, widening at the centre into a circular depression
    incised with a compass rose. A carved wooden bar crosses the box at waist height, pierced
    by two wooden poles — a short hand-grip pole at the left, and a long central pole ending
    in a T-bar carved with an arrow.

    '
  scene_core: 'The interior of a strange wooden box like a sorcerer''s cabinet: panelled walls
    painted in bold blocks of red, black, white, yellow and blue, with two short panels of mahogany
    and pine; an open stone floor cut by a north-south channel that widens to a central circular
    compass-rose depression; a waist-high carved bar threaded by two wooden poles, the central
    one ending in a T-bar carved with an arrow; arcane, puzzling, dim.

    '
  rooms:
  - IN-MIRROR
