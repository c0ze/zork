  scene_core: This is the workshop of the Wizard of Frobozz.
- id: Wizard's Workroom
  room: WORKBENCH-ROOM
  rooms:
  - WORKBENCH-ROOM
  slug: wizard-s-workroom
  region: wonder
  anchors:
  - wizard-of-frobozz
  scene_description: This room is the Wizard's workroom. A hall continues east and west, and
    a larger room lies to the south. There are many shelves and racks on the walls, but the
    Wizard's workbench dominates the room. It is made of dark, heavy wood bound with iron. The
    workbench is stained from many years of use, and is deeply gouged as though some huge clawed
    animal was imprisoned on it. There are burn marks and even notes written in a crabbed hand.
    Many arcane items are scattered about the bench; alembics, mortar and pestle, small knives
    of various sizes, odd scraps of vellum, wax candles, and much more. In the center of a relatively
    clear area of the bench are affixed three stands - ruby, sapphire, and diamond - which form
    a triangle.
  scene_core: This room is the Wizard's workroom. A hall continues east and west, and a larger
    room lies to the south. There are many shelves and racks on the walls, but the Wizard's
    workbench dominates the room. It is made of dark, heavy wood bound with iron. The workbench
    is stained from many years of use, and is deeply gouged as though some huge clawed animal
    was imprisoned on it. There are burn marks and even notes written in a crabbed hand. Many
    arcane items are scattered about the bench; alembics, mortar and pestle, small knives of
    various sizes, odd scraps of vellum, wax candles, and much more. In the center of a relatively
    clear area of the bench are affixed three stands - ruby, sapphire, and diamond - which form
    a triangle.
- id: Trophy Room
  room: TROPHY-ROOM
  rooms:
  - TROPHY-ROOM
  slug: trophy-room
  region: underground
  anchors: []
  scene_description: This is the Wizard's trophy room, filled with memorabilia of various sorts.
    On one wall is the Wizard's D. T. (Doctor of Thaumaturgy) degree from GUE Tech. Several
    old magic wands are mounted on a wand rack. A collection of dull and nicked swords testify
    to the fate of many foolhardy adventurers. Small bottles contain discarded homunculi (a
    few preserved in alcohol). There is a stuffed owl on a perch.
  scene_core: This is the Wizard's trophy room, filled with memorabilia of various sorts. On
