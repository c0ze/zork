- id: Great Cavern
  room: GREAT-CAVERN
  rooms:
  - GREAT-CAVERN
  slug: great-cavern
  region: underground
  anchors: []
  scene_description: This is the center of the great cavern, carved out of the limestone. Stalactites
    and stalagmites of many sizes are everywhere. The room glows with dim light provided by
    phosphorescent moss, and weird shadows move all around you. A narrow path winds southwest
    among the stalagmites, and another leads northeast.
  scene_core: This is the center of the great cavern, carved out of the limestone. Stalactites
