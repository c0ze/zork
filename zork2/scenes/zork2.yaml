- id: Crypt Anteroom
  room: CRYPT-ANTEROOM
  slug: crypt-anteroom
  region: dread
  anchors: []
  scene_description: 'The anteroom is large and empty. Marble bas-reliefs depict the stirring
    times and afterlife of the Flatheads (the latter a bit optimistically). The exit is to the
    west. A huge marble door stands to the south, and above it is carved a cryptic inscription.

    '
  scene_core: 'A large, empty marble anteroom; the walls covered in elaborate carved bas-reliefs
    of robed Flathead kings and their imagined afterlife; a single passage west; a huge marble
    door in the south wall with a worn inscription carved above it; cold, solemn, dimly lit.

    '
  rooms:
  - CRYPT-ANTEROOM
- id: Crypt
  room: CRYPT-ROOM
  slug: crypt
  region: dread
  anchors: []
  scene_description: 'The room contains the earthly remains of the mighty Flatheads — twelve
    conspicuously flat heads mounted securely on poles. Though one might expect funerary urns
    or other relics of the ancient Zorkers, the crypt is empty of all such things. Writing is
    carved on the wall, and the only apparent exit is north, through the door to the anteroom.

    '
  scene_core: 'A solemn stone burial crypt; a row of twelve poles each bearing a grotesquely
    flat mummified head; the chamber otherwise bare of urns or grave-goods; faint inscriptions
    carved into the far wall; a door leading north; sepulchral, eerie, dim.

    '
  rooms:
  - CRYPT-ROOM
- id: Landing
  room: ZORK3
  slug: landing
  region: dread
  anchors: []
  scene_description: 'Beyond the door, a roughly hewn staircase leads down into darkness. The
    landing on which you stand is covered with carefully drawn magical runes, like those sketched
    on the workbench of the Wizard of Frobozz. They have been overlaid with sweeping green lines
    of enormous power that undulate slowly back and forth across the stone.

    '
  scene_core: 'The top of a rough-hewn stone staircase descending into pitch darkness; the broad
    stone landing inscribed with intricate magical runes, overlaid by sweeping luminous green
    lines of power that ripple across the floor; charged, ominous, on the threshold of something
    vast.

    '
  rooms:
  - ZORK3
- id: Guarded Room
  room: GUARDIAN-ROOM
  slug: guarded-room
  region: peril
  anchors: []
  scene_description: 'This room is cobwebby and musty, but tracks in the dust show that it has
    seen visitors recently. At the south end stands a stained and battered — but very strong-looking
    — door, and a corridor exits to the north. Embedded in the door is a nasty-looking lizard
    head, with sharp teeth and beady eyes that follow you.

    '
  scene_core: 'A cobwebbed, musty stone chamber with fresh tracks disturbing the dust; a massive
    battered iron-bound door at the south end; embedded in that door a snarling reptilian lizard
    head with sharp teeth and beady, watchful eyes; a dark corridor leading north; tense and
    menacing.

    '
  rooms:
  - GUARDIAN-ROOM
- id: Wizard's Workshop
  room: WIZARDS-WORKSHOP
  rooms:
  - WIZARDS-WORKSHOP
  slug: wizard-s-workshop
