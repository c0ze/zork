- id: North End of Garden
  room: GARDEN-NORTH
  rooms:
  - GARDEN-NORTH
  slug: north-end-of-garden
  region: above_ground
  anchors:
  - unicorn
  scene_description: This is the northern end of a formal garden. Hedges hide the cavern walls,
    and if you don't look up, the illusion is of a cloudy day outside. The light comes from
    a large growth of glowing mosses on the roof of the cave. A break in the hedge is almost
    overgrown to the north. A carefully manicured path leads south. In the center of a rosebed
    is a small open structure, painted white. It appears to be a gazebo.
  scene_core: This is the northern end of a formal garden. Hedges hide the cavern walls, and
    if you don't look up, the illusion is of a cloudy day outside. The light comes from a large
