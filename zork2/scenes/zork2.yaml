  - FORMAL-GARDEN
  slug: formal-garden
  region: above_ground
  anchors:
  - unicorn
  - princess
  scene_description: This is the middle part of a formal garden. Hedges hide the cavern walls
    and a dim illumination comes from mosses far above. The path is of small crushed white stones.
    It winds among bushes and flower beds from south to north. To the north a small structure
    can be seen. To the south are peculiarly shaped bushes. There is a small gap in the hedges
    to the west.
  scene_core: This is the middle part of a formal garden. Hedges hide the cavern walls and a
