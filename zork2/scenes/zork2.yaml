- id: Shallow Ford
  room: SHALLOW-FORD
  rooms:
  - SHALLOW-FORD
  slug: shallow-ford
  region: underground
  anchors: []
  scene_description: You are at the southern edge of a great cavern. To the south across a shallow
    ford is a dark tunnel which looks like it was once enlarged and smoothed. To the north a
    narrow path winds among stalagmites. Dim light illuminates the cavern.
  scene_core: You are at the southern edge of a great cavern. To the south across a shallow
