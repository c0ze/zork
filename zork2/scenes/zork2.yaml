- id: Marble Hall
  room: MARBLE-HALL
  rooms:
  - MARBLE-HALL
  slug: marble-hall
  region: wonder
  anchors: []
  scene_description: This is an arched hall of fine marble. The hall stops abruptly to the north
    at a ford across a stream, where the marble is cracked and broken. Perhaps a flood or collapse
    of the cave was responsible. To the south the hall opens into a large room. There is rather
    annoying whirring sound coming from that room.
  scene_core: This is an arched hall of fine marble. The hall stops abruptly to the north at
