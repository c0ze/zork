- id: Menhir Room
  room: MENHIR-ROOM
  rooms:
  - MENHIR-ROOM
  slug: menhir-room
  region: peril
  anchors:
  - menhir
  scene_description: This is a large room which was evidently used once as a quarry. Many large
    limestone chunks lie helter-skelter around the room. Some are rough-hewn and unworked, others
    smooth and well-finished. One side of the room appears to have been used to quarry building
    blocks, the other to produce menhirs (standing stones). Obvious passages lead north and
    south.
  scene_core: This is a large room which was evidently used once as a quarry. Many large limestone
