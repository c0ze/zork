- id: Narrow Tunnel
  room: NARROW-TUNNEL
  rooms:
  - NARROW-TUNNEL
  slug: narrow-tunnel
  region: underground
  anchors: []
  scene_description: You are standing at the southern end of a narrow tunnel where it opens
    into a wide cavern. The cavern is dimly illuminated by phosphorescent mosses clinging to
    its high ceiling. A deep ravine winds through the cavern, with a small stream at the bottom.
    The walls of the ravine are steep and crumbly. A foot bridge crosses the ravine to the south.
  scene_core: You are standing at the southern end of a narrow tunnel where it opens into a
    wide cavern. The cavern is dimly illuminated by phosphorescent mosses clinging to its high
    ceiling. A deep ravine winds through the cavern, with a small stream at the bottom. The
    walls of the ravine are steep and crumbly. A foot bridge crosses the ravine to the south.
- id: Foot Bridge
  room: FOOT-BRIDGE
  rooms:
  - FOOT-BRIDGE
  slug: foot-bridge
  region: underground
  anchors: []
  scene_description: You are standing on a crude but sturdy wooden foot bridge crossing a deep
    ravine. The path runs north and south from here.
  scene_core: You are standing on a crude but sturdy wooden foot bridge crossing a deep ravine.
