  rooms:
  - RAVINE-LEDGE
  slug: ledge-in-ravine
  region: underground
  anchors: []
  scene_description: You are on a narrow ledge near the bottom of a deep ravine. The ledge continues
    to the west. A precarious climb up to another tiny ledge is possible. A short scramble down
    the rock face leads to a stream.
  scene_core: You are on a narrow ledge near the bottom of a deep ravine. The ledge continues
