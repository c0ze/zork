- id: Topiary
  room: TOPIARY-ROOM
  rooms:
  - TOPIARY-ROOM
  slug: topiary
  region: above_ground
  anchors:
  - unicorn
  scene_description: 'This is the southern end of a formal garden. Hedges hide the cavern walls
    and mosses provide dim illumination. Fantastically shaped hedges and bushes are arrayed
    with geometric precision. They have not recently been clipped, but you can discern creatures
    in the shapes of the bushes: There is a dragon, a unicorn, a great serpent, a huge misshapen
    dog, and several human figures. On the west side of the garden the path leads through a
    rose arbor into a tunnel.'
  scene_core: 'This is the southern end of a formal garden. Hedges hide the cavern walls and
    mosses provide dim illumination. Fantastically shaped hedges and bushes are arrayed with
    geometric precision. They have not recently been clipped, but you can discern creatures
    in the shapes of the bushes: There is a dragon, a unicorn, a great serpent, a huge misshapen
    dog, and several human figures. On the west side of the garden the path leads through a
    rose arbor into a tunnel.'
- id: Path Near Stream
  room: STREAM-PATH
  rooms:
  - STREAM-PATH
  slug: path-near-stream
  region: underground
  anchors: []
  scene_description: The path follows the south edge of a deep ravine and heads northeast. A
    tunnel heads southwest, narrowing to a rather tight crawl. A faint whirring sound can be
    heard in that direction. On the east is a ruined archway choked with vegetation.
  scene_core: The path follows the south edge of a deep ravine and heads northeast. A tunnel
