  rooms:
  - KENNEL
  slug: kennel
  region: dread
  anchors: []
  scene_description: This room looks like it was once a kennel for a very large dog (some of
    the bones would fit a dinosaur). It apparently hasn't been used for a long time, as the
    dust is fairly thick all over. The only exit is northeast.
  scene_core: This room looks like it was once a kennel for a very large dog (some of the bones
