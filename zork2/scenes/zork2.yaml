- id: Wizard's Quarters
  room: WIZARDS-QUARTERS
  slug: wizard-s-quarters
  region: wonder
  anchors:
  - wizard-of-frobozz
  scene_description: 'This is where the Wizard of Frobozz lives. The room is sparsely furnished
    and almost monkish in its austerity; the only furniture is a hammock. It is said to wear
    a different aspect each time it is seen.

    '
  scene_core: 'The austere private chamber of the Wizard of Frobozz; bare stone walls, spartan
    and monkish; a single hammock slung across the room; an air of faded, eccentric magic; dim
    and quiet.

    '
  rooms:
  - WIZARDS-QUARTERS
- id: Carousel Room
  room: CAROUSEL-ROOM
  slug: carousel-room
  region: peril
  anchors: []
  scene_description: 'You are in a large circular room whose high ceiling is lost in gloom.
    Eight identical passages leave the room. A loud whirring sound comes from all around, and
    you feel strangely disoriented here.

    '
