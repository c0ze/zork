    annoying whirring sound coming from that room.
- id: Deep Ford
  room: DEEP-FORD
  rooms:
  - DEEP-FORD
  slug: deep-ford
  region: underground
  anchors: []
  scene_description: You are fording the stream at a deep but not impossible spot. The water
    is very cold. The walls of the ravine rise to east and west. There is a small ledge along
    the north wall of the ravine. To the south is the entrance to a well-constructed but somewhat
    ruined hall.
  scene_core: You are fording the stream at a deep but not impossible spot. The water is very
