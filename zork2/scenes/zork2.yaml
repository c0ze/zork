  rooms:
  - GAZEBO-ROOM
  slug: gazebo
  region: above_ground
  anchors: []
  scene_description: This is a gazebo in the midst of a formal garden. It is cool and restful
    here. A tea table adorns the center of the gazebo.
  scene_core: This is a gazebo in the midst of a formal garden. It is cool and restful here.
