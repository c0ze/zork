- id: Inside the Barrow
  room: INSIDE-BARROW
  rooms:
  - INSIDE-BARROW
  slug: inside-the-barrow
  region: above_ground
  anchors: []
  scene_description: You are inside an ancient barrow hidden deep within a dark forest. The
    barrow opens into a narrow tunnel at its southern end. You can see a faint glow at the far
    end.
