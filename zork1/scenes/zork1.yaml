- id: Dam
  room: DAM-ROOM
  rooms:
  - DAM-ROOM
  slug: dam
  region: underground
  anchors: []
  scene_description: 'You are standing on the top of the Flood Control Dam #3, which was quite
    a tourist attraction in times far distant. There are paths to the north, south, and west,
    and a scramble down. The water level behind the dam is low: The sluice gates have been opened.
    Water rushes through the dam and downstream. The sluice gates are open, and water rushes
    through the dam. The water level behind the dam is still high. The sluice gates are closed.
    The water level in the reservoir is quite low, but the level is rising quickly. The sluice
    gates on the dam are closed. Behind the dam, there can be seen a wide reservoir. Water is
    pouring over the top of the now abandoned dam. There is a control panel here, on which a
    large metal bolt is mounted. Directly above the bolt is a small green plastic bubble which
    is glowing serenely .'
