  scene_description: This room has an exit on the northwest, and a staircase leading up. The
    cyclops is sleeping blissfully at the foot of the stairs. The east wall, previously solid,
    now has a cyclops-sized opening in it. A cyclops, who looks prepared to eat horses (much
    less mere adventurers), blocks the staircase. From his state of health, and the bloodstains
    on the walls, you gather that he is not very friendly, though he likes people. The cyclops
    is standing in the corner, eyeing you closely. I don't think he likes you very much. He
    looks extremely hungry, even for a cyclops. The cyclops, having eaten the hot peppers, appears
    to be gasping. His enflamed tongue protrudes from his man-sized mouth.
