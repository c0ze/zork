<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zork II — interpreter</title>
  <link rel="stylesheet" href="vendor/parchment/parchment.css" type="text/css">
  <script src="vendor/parchment/jquery.min.js"></script>
  <script src="vendor/parchment/ie.js" nomodule></script>
  <script src="vendor/parchment/parchment.js"></script>
  <script src="vendor/parchment/resourcemap.js" type="text/javascript"></script>
  <script>
    parchment_options = {
      default_story: ["stories/zork2.z3.js"],
      lib_path: "vendor/parchment/",
      story_name: "Zork II",
      do_vm_autosave: true
    };
  </script>
  <style>
    :root {
      --term-bg: #0a0a0e; --term-ink: #cfe8c9; --accent: #d98a2b;
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }
    html[data-theme="light"] { --term-bg: #f4efe2; --term-ink: #2b2620; --accent: #a8571a; }
    html, body { margin: 0; height: 100%; background: var(--term-bg); }
    #gameport { position: absolute; inset: 0; overflow: hidden; background: var(--term-bg) !important; }
    #windowport { background: var(--term-bg) !important; }
    .BufferWindow, .GridWindow {
      background: var(--term-bg) !important; color: var(--term-ink) !important;
      font-family: var(--mono) !important;
    }
    .BufferWindow { font-size: 15px; line-height: 1.55; }
    .GridWindow { opacity: 0.85; }
    [class*="Style_"], .BufferLine, .GridLine { color: var(--term-ink) !important; }
    .Style_input { color: var(--accent) !important; font-weight: 500; }
    .Input, textarea.Input, .LineInput {
      color: var(--accent) !important; background: transparent !important; font-family: var(--mono) !important;
    }
    #loadingpane { color: var(--term-ink); }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div id="gameport">
    <div id="windowport">
      <noscript><p>Enable JavaScript to play.</p></noscript>
    </div>
    <div id="loadingpane">
      <img src="vendor/parchment/waiting.gif" alt="LOADING"><br><em>&nbsp;&nbsp;Loading…</em>
    </div>
    <div id="errorpane" style="display:none;"><div id="errorcontent"></div></div>
  </div>
</body>
</html>
