<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zork I — illustrated</title>
  <link rel="stylesheet" href="styles.css?v=3">
</head>
<body>
  <header class="topbar">
    <h1>ZORK&nbsp;I</h1>
    <div class="controls">
      <label>Style
        <select id="style-select"></select>
      </label>
      <label id="voice-control" hidden>Voice
        <select id="voice-select"></select>
      </label>
      <label>Theme
        <select id="theme-select">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
        </select>
      </label>
      <span class="actl">
        <button id="music-toggle" type="button" aria-pressed="true">Music</button>
        <input type="range" id="music-vol" min="0" max="1" step="0.05" value="0.35" aria-label="Music volume">
      </span>
      <span class="actl">
        <button id="narration-toggle" type="button" aria-pressed="true">Narration</button>
        <input type="range" id="tts-vol" min="0" max="1" step="0.05" value="1" aria-label="Narration volume">
      </span>
    </div>
  </header>

  <main class="stage">
    <section class="scene" aria-label="Scene illustration">
      <figure id="scene-figure">
        <img id="scene-img" alt="" hidden>
        <div id="scene-placeholder" class="placeholder">Loading…</div>
        <figcaption id="scene-caption"></figcaption>
      </figure>
    </section>

    <section class="game" aria-label="Game">
      <iframe id="game-frame" src="play.html?v=4" title="Zork interpreter"></iframe>
    </section>
  </main>

  <audio id="narration" preload="none"></audio>
  <audio id="music" preload="none"></audio>

  <div id="start-overlay">
    <button id="start-btn" type="button">▶ Enter the Great Underground Empire</button>
  </div>

  <script src="app.js?v=3"></script>
</body>
</html>
